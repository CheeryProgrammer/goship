name: Reusable — Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name without tag (e.g. "ghcr.io/org/app")'
        type: string
        required: true
      dockerfile:
        description: 'Path to Dockerfile'
        type: string
        default: 'Dockerfile'
      context:
        description: 'Docker build context path'
        type: string
        default: '.'
      platforms:
        description: 'Comma-separated target platforms (e.g. "linux/amd64,linux/arm64")'
        type: string
        default: 'linux/amd64'
      build-args:
        description: 'Newline-separated docker build-args (e.g. "VERSION=1.0\nENV=prod")'
        type: string
        default: ''
      push:
        description: 'Push image after build (set true only if registry secrets are provided)'
        type: boolean
        default: false
      registry:
        description: 'Registry host for docker login (e.g. "ghcr.io", "docker.io")'
        type: string
        default: 'ghcr.io'
      cache-from:
        description: 'Cache source (passed to --cache-from). Leave empty to disable.'
        type: string
        default: 'type=gha'
      cache-to:
        description: 'Cache destination (passed to --cache-to). Leave empty to disable.'
        type: string
        default: 'type=gha,mode=max'
      artifact-name:
        description: 'Name of a previously built binary artifact to download before build'
        type: string
        default: ''
      runner:
        description: 'GitHub Actions runner label'
        type: string
        default: 'ubuntu-latest'
    secrets:
      REGISTRY_USERNAME:
        description: 'Registry login username (required when push is true)'
        required: false
      REGISTRY_PASSWORD:
        description: 'Registry login password/token (required when push is true)'
        required: false
    outputs:
      image-tag:
        description: 'Primary image tag produced by the build'
        value: ${{ jobs.docker-build.outputs.image-tag }}
      image-digest:
        description: 'Image digest (sha256:...)'
        value: ${{ jobs.docker-build.outputs.image-digest }}

jobs:
  docker-build:
    name: Docker Build
    runs-on: ${{ inputs.runner }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        if: ${{ inputs.artifact-name != '' }}
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ./bin/

      - name: Make binary executable
        if: ${{ inputs.artifact-name != '' }}
        run: chmod +x ./bin/*

      - name: Log in to ${{ inputs.registry }}
        if: ${{ inputs.push }}
        env:
          REGISTRY: ${{ inputs.registry }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          echo "$REGISTRY_PASSWORD" | buildah login \
            --username "$REGISTRY_USERNAME" \
            --password-stdin \
            "$REGISTRY"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build (and optionally push)
        id: build
        env:
          BUILD_ARGS: ${{ inputs.build-args }}
          META_LABELS: ${{ steps.meta.outputs.labels }}
          META_TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          BUILD_ARG_FLAGS=()
          while IFS= read -r arg; do
            [ -n "$arg" ] && BUILD_ARG_FLAGS+=(--build-arg "$arg")
          done <<< "$BUILD_ARGS"

          LABEL_FLAGS=()
          while IFS= read -r lbl; do
            [ -n "$lbl" ] && LABEL_FLAGS+=(--label "$lbl")
          done <<< "$META_LABELS"

          MANIFEST_NAME="goship-manifest-$$"

          buildah build \
            --jobs=2 \
            --platform="${{ inputs.platforms }}" \
            --manifest "$MANIFEST_NAME" \
            --file "${{ inputs.dockerfile }}" \
            "${BUILD_ARG_FLAGS[@]}" \
            "${LABEL_FLAGS[@]}" \
            "${{ inputs.context }}"

          if [ "${{ inputs.push }}" = "true" ]; then
            DIGEST_FILE=$(mktemp)
            while IFS= read -r tag; do
              [ -n "$tag" ] && buildah manifest push --all --format v2s2 \
                --digestfile "$DIGEST_FILE" \
                "$MANIFEST_NAME" "docker://$tag"
            done <<< "$META_TAGS"
            echo "digest=$(cat "$DIGEST_FILE")" >> "$GITHUB_OUTPUT"
          fi
