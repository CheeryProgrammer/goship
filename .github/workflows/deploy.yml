name: Reusable — Deploy (SSH + Docker Compose)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target GitHub deployment environment (staging | production | …)'
        type: string
        required: true
      image-name:
        description: 'Docker image name without tag (e.g. "ghcr.io/org/app")'
        type: string
        required: true
      image-tag:
        description: 'Docker image tag to deploy'
        type: string
        required: true
      ssh-host:
        description: 'Target SSH host'
        type: string
        required: true
      ssh-user:
        description: 'SSH user on the remote host'
        type: string
        default: 'deploy'
      ssh-port:
        description: 'SSH port'
        type: string
        default: '22'
      compose-file-local:
        description: 'Path to docker-compose.yml in the repository'
        type: string
        default: 'docker-compose.yml'
      compose-file-remote:
        description: 'Destination path on the remote host'
        type: string
        default: '~/app/docker-compose.yml'
      service-name:
        description: 'Docker Compose service name to update (empty = all services)'
        type: string
        default: ''
      strategy:
        description: 'Deployment strategy: recreate (default) | blue-green'
        type: string
        default: 'recreate'
      blue-service:
        description: 'Blue service name (blue-green strategy only)'
        type: string
        default: ''
      green-service:
        description: 'Green service name (blue-green strategy only)'
        type: string
        default: ''
      health-timeout:
        description: 'Seconds to wait for the new color to become healthy (blue-green strategy only)'
        type: string
        default: '120'
      ssh-known-hosts:
        description: 'Contents of known_hosts for the target server (recommended over StrictHostKeyChecking=no)'
        type: string
        default: ''
      runner:
        description: 'GitHub Actions runner label'
        type: string
        default: 'ubuntu-latest'
    secrets:
      SSH_PRIVATE_KEY:
        description: 'SSH private key for the deploy user'
        required: true
      REGISTRY_USERNAME:
        description: 'Registry username (so the server can pull the image)'
        required: false
      REGISTRY_PASSWORD:
        description: 'Registry password / token'
        required: false

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ${{ inputs.runner }}
    environment:
      name: ${{ inputs.environment }}
    concurrency:
      group: deploy-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          if [ -n "${{ inputs.ssh-known-hosts }}" ]; then
            echo "${{ inputs.ssh-known-hosts }}" >> ~/.ssh/known_hosts
          else
            # Fallback: scan and trust on first connect (less secure)
            ssh-keyscan -p ${{ inputs.ssh-port }} -H "${{ inputs.ssh-host }}" >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/known_hosts

      - name: Upload compose file to server
        run: |
          # Ensure the destination directory exists.
          # Single quotes prevent the runner from expanding ~ — the remote shell does it instead.
          ssh -p ${{ inputs.ssh-port }} ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
            'mkdir -p $(dirname ${{ inputs.compose-file-remote }})'

          scp -P ${{ inputs.ssh-port }} \
            ${{ inputs.compose-file-local }} \
            ${{ inputs.ssh-user }}@${{ inputs.ssh-host }}:${{ inputs.compose-file-remote }}

      - name: Pull new image on server
        env:
          IMAGE: ${{ inputs.image-name }}:${{ inputs.image-tag }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          ssh -p ${{ inputs.ssh-port }} ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
            IMAGE="$IMAGE" REGISTRY_USERNAME="$REGISTRY_USERNAME" REGISTRY_PASSWORD="$REGISTRY_PASSWORD" \
            bash <<'ENDSSH'
            set -euo pipefail

            # Log in to registry if credentials are provided
            if [ -n "${REGISTRY_USERNAME:-}" ] && [ -n "${REGISTRY_PASSWORD:-}" ]; then
              REGISTRY=$(echo "${IMAGE}" | cut -d'/' -f1)
              echo "${REGISTRY_PASSWORD}" | docker login "${REGISTRY}" -u "${REGISTRY_USERNAME}" --password-stdin
            fi

            echo "Pulling ${IMAGE} …"
            docker pull "${IMAGE}"
          ENDSSH

      - name: Update and restart service
        if: ${{ inputs.strategy != 'blue-green' }}
        env:
          IMAGE: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        run: |
          ssh -p ${{ inputs.ssh-port }} ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
            IMAGE="$IMAGE" \
            bash <<'ENDSSH'
            set -euo pipefail
            COMPOSE_FILE="${{ inputs.compose-file-remote }}"
            # ~ is not expanded inside double quotes; replace it explicitly so docker compose gets an absolute path
            COMPOSE_FILE="${COMPOSE_FILE/#\~/$HOME}"
            SERVICE="${{ inputs.service-name }}"

            # Export IMAGE so compose can reference it via $IMAGE in the compose file
            export IMAGE="${IMAGE}"

            if [ -n "${SERVICE}" ]; then
              echo "Updating service '${SERVICE}' …"
              docker compose -f "${COMPOSE_FILE}" up -d --no-deps --pull never "${SERVICE}"
            else
              echo "Restarting all services …"
              docker compose -f "${COMPOSE_FILE}" up -d --pull never
            fi

            # Remove dangling images left by the update
            docker image prune -f
          ENDSSH

      - name: Blue-Green deploy
        if: ${{ inputs.strategy == 'blue-green' }}
        env:
          IMAGE: ${{ inputs.image-name }}:${{ inputs.image-tag }}
        run: |
          ssh -p ${{ inputs.ssh-port }} ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} \
            IMAGE="$IMAGE" \
            bash <<'ENDSSH'
            set -euo pipefail
            COMPOSE_FILE="${{ inputs.compose-file-remote }}"
            # ~ is not expanded inside double quotes; replace it explicitly so docker compose gets an absolute path
            COMPOSE_FILE="${COMPOSE_FILE/#\~/$HOME}"
            BLUE="${{ inputs.blue-service }}"
            GREEN="${{ inputs.green-service }}"
            HEALTH_TIMEOUT="${{ inputs.health-timeout }}"

            if [ -z "${BLUE}" ] || [ -z "${GREEN}" ]; then
              echo "::error::blue-green strategy requires both 'blue-service' and 'green-service' inputs."
              exit 1
            fi

            # Export IMAGE so compose can reference it via $IMAGE in the compose file
            export IMAGE="${IMAGE}"

            compose() { docker compose -f "${COMPOSE_FILE}" "$@"; }

            # A service is "running" when it has a container whose State.Running is true.
            is_running() {
              svc="$1"
              cid=$(compose ps -q "${svc}" 2>/dev/null || true)
              [ -n "${cid}" ] || return 1
              running=$(docker inspect -f '{{.State.Running}}' "${cid}" 2>/dev/null || echo "false")
              [ "${running}" = "true" ]
            }

            # Wait for a service's container to report State.Health == healthy.
            wait_healthy() {
              svc="$1"
              cid=$(compose ps -q "${svc}")
              if [ -z "${cid}" ]; then
                echo "::error::No container found for service '${svc}'."
                return 1
              fi
              echo "Waiting up to ${HEALTH_TIMEOUT}s for '${svc}' to become healthy …"
              elapsed=0
              while [ "${elapsed}" -lt "${HEALTH_TIMEOUT}" ]; do
                health=$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "${cid}" 2>/dev/null || echo "none")
                case "${health}" in
                  healthy)
                    echo "'${svc}' is healthy."
                    return 0
                    ;;
                  none)
                    echo "::error::Service '${svc}' has no healthcheck; blue-green requires a per-color health check."
                    return 1
                    ;;
                esac
                sleep 3
                elapsed=$((elapsed + 3))
              done
              echo "::error::Service '${svc}' did not become healthy within ${HEALTH_TIMEOUT}s."
              docker inspect -f '{{json .State.Health}}' "${cid}" || true
              compose logs --tail=50 "${svc}" || true
              return 1
            }

            # Determine the active color (if any).
            ACTIVE=""
            INACTIVE=""
            if is_running "${BLUE}"; then
              ACTIVE="${BLUE}"
              INACTIVE="${GREEN}"
            elif is_running "${GREEN}"; then
              ACTIVE="${GREEN}"
              INACTIVE="${BLUE}"
            fi

            if [ -z "${ACTIVE}" ]; then
              # Neither color running: cold start with a one-time transitional downtime.
              echo "No active color running — cold-starting '${BLUE}' (one-time transitional downtime)."
              compose down --remove-orphans
              compose up -d --no-deps --pull never "${BLUE}"
              wait_healthy "${BLUE}"
              docker image prune -f
              echo "Cold start complete: '${BLUE}' is live."
              exit 0
            fi

            echo "Active color: '${ACTIVE}'. Rolling out new image to inactive color '${INACTIVE}' …"
            compose up -d --no-deps --pull never "${INACTIVE}"
            wait_healthy "${INACTIVE}"

            # New color is healthy — SO_REUSEPORT lets both bind the same port during the overlap.
            echo "'${INACTIVE}' is healthy — stopping previous color '${ACTIVE}'."
            compose stop "${ACTIVE}"
            docker image prune -f
            echo "Blue-green switch complete: '${INACTIVE}' is now live."
          ENDSSH

      - name: Verify service is healthy
        if: ${{ inputs.strategy != 'blue-green' }}
        run: |
          ssh -p ${{ inputs.ssh-port }} ${{ inputs.ssh-user }}@${{ inputs.ssh-host }} bash <<'ENDSSH'
            set -euo pipefail
            COMPOSE_FILE="${{ inputs.compose-file-remote }}"
            # ~ is not expanded inside double quotes; replace it explicitly so docker compose gets an absolute path
            COMPOSE_FILE="${COMPOSE_FILE/#\~/$HOME}"
            SERVICE="${{ inputs.service-name }}"

            TARGET="${SERVICE:-}"
            echo "Waiting for containers to become healthy …"
            sleep 5

            # Check that no configured containers are in a non-running state
            UNHEALTHY=$(docker compose -f "${COMPOSE_FILE}" ps --format json ${TARGET} \
              | grep -v '"State":"running"' || true)

            if [ -n "${UNHEALTHY}" ]; then
              echo "::error::One or more containers are not running:"
              docker compose -f "${COMPOSE_FILE}" ps ${TARGET}
              docker compose -f "${COMPOSE_FILE}" logs --tail=50 ${TARGET}
              exit 1
            fi

            echo "All containers are running."
            docker compose -f "${COMPOSE_FILE}" ps ${TARGET}
          ENDSSH

      - name: Deployment summary
        run: |
          {
            echo "## Deployment Summary"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Image | \`${{ inputs.image-name }}:${{ inputs.image-tag }}\` |"
            echo "| Host | \`${{ inputs.ssh-host }}\` |"
            echo "| Compose file | \`${{ inputs.compose-file-remote }}\` |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"
